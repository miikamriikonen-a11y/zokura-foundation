<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yomi kuulee</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    padding: 16px 24px;
    background: #111;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 500;
    color: #888;
  }
  .header h1 span { color: #e0e0e0; }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #666;
  }
  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #333;
    transition: background 0.3s;
  }
  .status-dot.listening {
    background: #e74c3c;
    box-shadow: 0 0 8px #e74c3c88;
    animation: pulse 1.5s infinite;
  }
  .status-dot.ready {
    background: #2ecc71;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .controls {
    padding: 16px 24px;
    background: #111;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  button {
    padding: 10px 24px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  #startBtn {
    background: #e74c3c;
    color: white;
  }
  #startBtn:hover { background: #c0392b; }
  #startBtn.active {
    background: #333;
    color: #999;
  }
  #clearBtn {
    background: #222;
    color: #999;
  }
  #clearBtn:hover { background: #333; }
  .lang-select {
    margin-left: auto;
    display: flex;
    gap: 6px;
  }
  .lang-btn {
    padding: 6px 12px;
    background: #222;
    color: #888;
    border-radius: 4px;
    font-size: 12px;
  }
  .lang-btn.active {
    background: #333;
    color: #e0e0e0;
  }
  .transcript-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }
  .transcript-area::-webkit-scrollbar { width: 6px; }
  .transcript-area::-webkit-scrollbar-track { background: transparent; }
  .transcript-area::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  .utterance {
    margin-bottom: 16px;
    padding: 12px 16px;
    background: #151515;
    border-left: 3px solid #333;
    border-radius: 0 6px 6px 0;
    font-size: 16px;
    line-height: 1.6;
  }
  .utterance.final {
    border-left-color: #2ecc71;
    color: #e0e0e0;
  }
  .utterance.interim {
    border-left-color: #e74c3c;
    color: #888;
    font-style: italic;
  }
  .utterance .time {
    font-size: 11px;
    color: #444;
    margin-bottom: 4px;
  }
  .no-support {
    text-align: center;
    padding: 60px;
    color: #666;
    font-size: 18px;
  }
  #fullText {
    position: absolute;
    left: -9999px;
    top: -9999px;
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>Yomi</span> kuulee</h1>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Odottaa</span>
  </div>
</div>

<div class="controls">
  <button id="startBtn" onclick="toggleListening()">Kuuntele</button>
  <button id="clearBtn" onclick="clearTranscript()">Tyhjennä</button>
  <button id="copyBtn" onclick="copyTranscript()" style="background:#2ecc71;color:white;">Kopioi Yomille</button>
  <div class="lang-select">
    <button class="lang-btn active" id="langFi" onclick="setLang('fi-FI')">Suomi</button>
    <button class="lang-btn" id="langEn" onclick="setLang('en-US')">English</button>
  </div>
</div>

<div class="transcript-area" id="transcriptArea"></div>

<!-- Hidden element that holds all final text for easy reading -->
<div id="fullText"></div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  document.getElementById('transcriptArea').innerHTML = '<div class="no-support">Selain ei tue puheentunnistusta. Käytä Chromea.</div>';
}

let recognition = null;
let isListening = false;
let currentLang = 'fi-FI';
let allFinalText = [];

function createRecognition() {
  const r = new SpeechRecognition();
  r.continuous = true;
  r.interimResults = true;
  r.lang = currentLang;
  r.maxAlternatives = 1;

  let interimEl = null;

  r.onstart = () => {
    isListening = true;
    document.getElementById('statusDot').className = 'status-dot listening';
    document.getElementById('statusText').textContent = 'Kuuntelee...';
    document.getElementById('startBtn').textContent = 'Pysäytä';
    document.getElementById('startBtn').classList.add('active');
  };

  r.onresult = (event) => {
    let interimText = '';
    let finalText = '';

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalText += transcript;
      } else {
        interimText += transcript;
      }
    }

    if (finalText) {
      if (interimEl) { interimEl.remove(); interimEl = null; }
      addUtterance(finalText.trim(), true);
      allFinalText.push(finalText.trim());
      document.getElementById('fullText').textContent = allFinalText.join('\n\n');
    }

    if (interimText) {
      if (!interimEl) {
        interimEl = document.createElement('div');
        interimEl.className = 'utterance interim';
        document.getElementById('transcriptArea').appendChild(interimEl);
      }
      interimEl.innerHTML = '<div class="time">' + timeNow() + '</div>' + interimText;
      scrollToBottom();
    }
  };

  r.onerror = (event) => {
    if (event.error === 'no-speech') return;
    console.error('Speech error:', event.error);
  };

  r.onend = () => {
    if (isListening) {
      // Auto-restart if still supposed to be listening
      try { r.start(); } catch(e) {}
    } else {
      document.getElementById('statusDot').className = 'status-dot ready';
      document.getElementById('statusText').textContent = 'Valmis';
      document.getElementById('startBtn').textContent = 'Kuuntele';
      document.getElementById('startBtn').classList.remove('active');
    }
  };

  return r;
}

function toggleListening() {
  if (isListening) {
    isListening = false;
    if (recognition) recognition.stop();
  } else {
    recognition = createRecognition();
    recognition.start();
  }
}

function setLang(lang) {
  currentLang = lang;
  document.getElementById('langFi').classList.toggle('active', lang === 'fi-FI');
  document.getElementById('langEn').classList.toggle('active', lang === 'en-US');
  if (isListening) {
    isListening = false;
    recognition.stop();
    setTimeout(() => {
      recognition = createRecognition();
      recognition.start();
      isListening = true;
    }, 300);
  }
}

function addUtterance(text, isFinal) {
  const div = document.createElement('div');
  div.className = 'utterance ' + (isFinal ? 'final' : 'interim');
  div.innerHTML = '<div class="time">' + timeNow() + '</div>' + text;
  document.getElementById('transcriptArea').appendChild(div);
  scrollToBottom();
}

function clearTranscript() {
  document.getElementById('transcriptArea').innerHTML = '';
  allFinalText = [];
  document.getElementById('fullText').textContent = '';
}

function copyTranscript() {
  const text = allFinalText.join('\n\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Kopioitu! ✌️';
    setTimeout(() => { btn.textContent = 'Kopioi Yomille'; }, 2000);
  });
}

function scrollToBottom() {
  const area = document.getElementById('transcriptArea');
  area.scrollTop = area.scrollHeight;
}

function timeNow() {
  return new Date().toLocaleTimeString('fi-FI', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
</script>

</body>
</html>
